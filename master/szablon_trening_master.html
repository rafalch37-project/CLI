<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twój Plan Treningowy - {{IMIE}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        
        @page {
            size: A4;
            margin: 0;
        }

        html, body {
            height: auto;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            box-sizing: border-box;
            padding: 20mm 0;
        }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 90vh;
            object-fit: contain;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        .table-container {
            width: 90%;
            max-width: 800px;
            margin-bottom: 28px;
        }

        .header {
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 20px;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: transparent;
        }

        th {
            background-color: #3b312b !important;
            color: #d4af37 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px;
            text-align: left;
            border: 1px solid #c5a059;
            font-size: 13px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
            border-left: 1px solid #e0e0e0;
            border-right: 1px solid #e0e0e0;
            word-wrap: break-word;
            background-color: rgba(255, 255, 255, 0.4);
        }

        .serie-col, .powt-col {
            text-align: center;
            width: 15%;
            white-space: nowrap;
        }

        .exercise-name {
            font-weight: 600;
            display: block;
            font-size: 14px;
        }

        .notes {
            font-size: 11px;
            color: #555;
            display: block;
            margin-top: 4px;
            font-style: italic;
        }

        @media screen and (max-width: 600px) {
            .header { font-size: 16px; letter-spacing: 2px; }
            .table-container { width: 96%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            table { min-width: 450px; }
            th, td { font-size: 11px; padding: 8px 6px; }
            .notes { font-size: 9px; }
        }

        @media print {
            .watermark { position: absolute; }
            .table-container { overflow: visible; }
        }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/rafalch37-project/CLI/main/szablony/logop.png" alt="Watermark" class="watermark">

    {{TRENING}}

</body>
</html>
