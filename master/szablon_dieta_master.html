<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Twój Plan Dietetyczny - {{IMIE}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        
        @page {
            size: A4;
            margin: 15mm 0;
        }

        html, body {
            height: auto;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            position: relative;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            box-sizing: border-box;
            padding-bottom: 20mm;
        }

        .watermark-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1000;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .watermark-container img {
            width: 90vw;
            height: 90vh;
            object-fit: contain;
            opacity: 0.07;
        }

        .table-container {
            width: 92%;
            max-width: 850px;
            margin-bottom: 12px;
            page-break-inside: avoid;
        }

        .header {
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 16px;
            margin-bottom: 8px;
            color: #1a1a1a;
            border-bottom: 1px solid #c5a059;
            padding-bottom: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: transparent;
        }

        th {
            background-color: #3b312b !important;
            color: #d4af37 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px;
            text-align: center;
            border: 1px solid #c5a059;
            font-size: 10px;
        }

        th:first-child {
            text-align: left;
            width: 45%;
        }

        td {
            padding: 8px 8px;
            border: 1px solid #e0e0e0;
            background-color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 11.5px;
        }

        td:first-child {
            text-align: left;
        }

        .summary-row td {
            font-weight: 600;
            background-color: rgba(197, 160, 89, 0.15);
        }

        .notes {
            font-size: 10.5px;
            font-style: italic;
            color: #555;
            margin-top: 4px;
            padding: 6px 10px;
            background: rgba(249, 249, 249, 0.4);
            border-left: 3px solid #c5a059;
        }

        .info-box {
            width: 92%;
            max-width: 850px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            background: #3b312b;
            color: #d4af37;
            padding: 8px 0;
            border-radius: 5px;
        }

        .main-title {
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            color: #1a1a1a;
        }

        @media print {
            .watermark-container { position: absolute; }
        }
    </style>
</head>
<body>

    <div class="watermark-container">
        <img src="https://raw.githubusercontent.com/rafalch37-project/CLI/main/szablony/logop.png" alt="Watermark">
    </div>

    <div class="main-title">PLAN DIETETYCZNY - {{IMIE}}</div>
    
    <div class="info-box" style="padding: 10px 0; font-size: 11px; letter-spacing: 1px;">
        <span>💧 NAWODNIENIE: MIN. 3L WODY DZIENNIE</span>
        <span>☕ KOFEINA: OGRANICZ SPOŻYCIE PO GODZINIE 16:00</span>
    </div>

    {{DIETA}}

    {{PODSUMOWANIE}}

</body>
</html>
