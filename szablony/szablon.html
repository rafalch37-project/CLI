<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szablon Planu Treningowego</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        
        @page {
            size: A4;
            margin: 0; /* Marginesy sterowane przez padding body */
        }

        html, body {
            height: 100%; /* Wymuszenie pełnej wysokości */
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; /* Równomierne rozłożenie w pionie */
            width: 100%;
            position: relative;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            box-sizing: border-box;
            padding: 20mm 0; /* Marginesy góra/dół dla wydruku */
        }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        .table-container {
            width: 90%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 20px;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: transparent;
        }

        th {
            background-color: #3b312b !important;
            color: #d4af37 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px;
            text-align: left;
            border: 1px solid #c5a059;
            font-size: 13px;
        }

        td {
            padding: 22px 10px; /* Wysokość wierszy */
            border: 1px solid #e0e0e0;
            background-color: rgba(255, 255, 255, 0.4);
        }

        .serie-col, .powt-col {
            text-align: center;
            width: 15%;
        }

        @media print {
            .watermark { position: absolute; }
        }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/rafalch37-project/CLI/main/szablony/logop.png" alt="Watermark" class="watermark">

    <!-- TABELA 1 -->
    <div class="table-container">
        <div class="header">TRENING A</div>
        <table>
            <thead>
                <tr>
                    <th>Nazwa Ćwiczenia</th>
                    <th class="serie-col">Serie</th>
                    <th class="powt-col">Powtórzenia</th>
                </tr>
            </thead>
            <tbody>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>

    <!-- TABELA 2 -->
    <div class="table-container">
        <div class="header">TRENING B</div>
        <table>
            <thead>
                <tr>
                    <th>Nazwa Ćwiczenia</th>
                    <th class="serie-col">Serie</th>
                    <th class="powt-col">Powtórzenia</th>
                </tr>
            </thead>
            <tbody>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>

</body>
</html>
