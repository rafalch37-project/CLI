<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dziennik Postępów - Raport Tygodniowy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        
        @page {
            size: A4;
            margin: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            position: relative;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            box-sizing: border-box;
            padding: 15mm 0;
        }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 850px;
            z-index: 1;
        }

        .header-main {
            text-align: center;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 22px;
            margin-bottom: 25px;
            color: #1a1a1a;
            border-bottom: 2px solid #c5a059;
            padding-bottom: 10px;
        }

        .section-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            border-left: 4px solid #3b312b;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.4);
        }

        .card-half { flex: 1; }
        .card-full { width: 100%; box-sizing: border-box; }

        .card-title {
            background-color: #3b312b;
            color: #d4af37;
            display: inline-block;
            padding: 5px 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: #777;
            padding-bottom: 8px;
            border-bottom: 1px solid #c5a059;
        }

        td {
            padding: 6px 5px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .input-field {
            width: 100%;
            border: 1px solid #e0e0e0;
            border-bottom: 2px solid #c5a059;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            color: #333;
            outline: none;
            padding: 4px;
            box-sizing: border-box;
            text-align: center;
            border-radius: 3px;
        }

        .scale-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .scale-label {
            font-size: 11px;
            font-weight: 600;
            width: 100px;
        }

        .circles {
            display: flex;
            gap: 5px;
        }

        .circle {
            width: 16px;
            height: 16px;
            border: 2px solid #3b312b;
            border-radius: 50%;
            cursor: pointer;
        }

        .circle.active {
            background-color: #d4af37;
            border-color: #d4af37;
        }

        .photo-container {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .photo-upload-box {
            flex: 1;
            aspect-ratio: 3/4;
            border: 2px dashed #c5a059;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.7);
        }

        .photo-upload-box span {
            font-size: 11px;
            font-weight: 600;
            color: #3b312b;
            text-transform: uppercase;
        }

        .photo-upload-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-input { display: none; }

        .notes-area {
            width: 100%;
            min-height: 80px;
            border: 1px solid #eee;
            margin-top: 10px;
            background: rgba(255,255,255,0.6);
            font-family: 'Montserrat', sans-serif;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 25px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            border: none;
        }

        .btn-print { background-color: #3b312b; color: #d4af37; }
        .btn-clear { background-color: #eee; color: #666; }

        /* Modal / Zoom */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #modal img { max-width: 90%; max-height: 90%; border: 3px solid #d4af37; }

        @media print {
            .actions { display: none; }
            .watermark { position: absolute; }
            #modal { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img">
    </div>

    <img src="https://raw.githubusercontent.com/rafalch37-project/CLI/main/szablony/logop.png" alt="Watermark" class="watermark">

    <div class="container">
        <div class="header-main">Dziennik Postępów: Raport Tygodniowy</div>

        <div class="section-row">
            <!-- POMIARY -->
            <div class="card card-half">
                <div class="card-title">Pomiary Sylwetki</div>
                <table>
                    <thead>
                        <tr>
                            <th>Partia</th>
                            <th>Poprzednio</th>
                            <th>Obecnie</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>Waga (kg)</td><td><input type="text" class="input-field"></td><td><input type="text" class="input-field"></td></tr>
                        <tr><td>Klatka</td><td><input type="text" class="input-field"></td><td><input type="text" class="input-field"></td></tr>
                        <tr><td>Biceps</td><td><input type="text" class="input-field"></td><td><input type="text" class="input-field"></td></tr>
                        <tr><td>Talia</td><td><input type="text" class="input-field"></td><td><input type="text" class="input-field"></td></tr>
                        <tr><td>Biodra</td><td><input type="text" class="input-field"></td><td><input type="text" class="input-field"></td></tr>
                        <tr><td>Udo</td><td><input type="text" class="input-field"></td><td><input type="text" class="input-field"></td></tr>
                    </tbody>
                </table>
            </div>

            <!-- SAMOPOCZUCIE -->
            <div class="card card-half">
                <div class="card-title">Samopoczucie (1-10)</div>
                <div class="scale-box"><span class="scale-label">Energia</span><div class="circles"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div></div>
                <div class="scale-box"><span class="scale-label">Sen</span><div class="circles"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div></div>
                <div class="scale-box"><span class="scale-label">Regeneracja</span><div class="circles"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div></div>
                <div class="scale-box"><span class="scale-label">Dieta</span><div class="circles"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div></div>
            </div>
        </div>

        <!-- ZDJĘCIA - TERAZ PEŁNA SZEROKOŚĆ -->
        <div class="card card-full">
            <div class="card-title">Zdjęcia Sylwetki</div>
            <p style="font-size: 10px; color: #666; margin-bottom: 5px;">Kliknij pole, aby dodać zdjęcie. Kliknij zdjęcie, aby powiększyć.</p>
            <div class="photo-container">
                <div class="photo-upload-box" id="box-przod">
                    <span onclick="document.getElementById('img-przod').click()">Przód</span>
                    <img id="prev-przod" onclick="openModal(this.src)">
                    <input type="file" id="img-przod" class="photo-input" accept="image/*" onchange="previewImage(this, 'prev-przod')">
                </div>
                <div class="photo-upload-box" id="box-bok">
                    <span onclick="document.getElementById('img-bok').click()">Bok</span>
                    <img id="prev-bok" onclick="openModal(this.src)">
                    <input type="file" id="img-bok" class="photo-input" accept="image/*" onchange="previewImage(this, 'prev-bok')">
                </div>
                <div class="photo-upload-box" id="box-tyl">
                    <span onclick="document.getElementById('img-tyl').click()">Tył</span>
                    <img id="prev-tyl" onclick="openModal(this.src)">
                    <input type="file" id="img-tyl" class="photo-input" accept="image/*" onchange="previewImage(this, 'prev-tyl')">
                </div>
            </div>
        </div>

        <div class="card card-full">
            <div class="card-title">Wnioski i Pytania</div>
            <textarea class="notes-area" placeholder="Jak minął tydzień?"></textarea>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="window.location.reload()">Wyczyść</button>
            <button class="btn btn-print" onclick="window.print()">Zapisz jako PDF</button>
        </div>
    </div>

    <script>
        document.querySelectorAll('.scale-box').forEach(group => {
            const circles = group.querySelectorAll('.circle');
            circles.forEach((circle, index) => {
                circle.addEventListener('click', () => {
                    circles.forEach(c => c.classList.remove('active'));
                    for(let i=0; i<=index; i++) circles[i].classList.add('active');
                });
            });
        });

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    input.parentElement.querySelector('span').style.display = 'none';
                    input.parentElement.style.border = '1px solid #eee';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openModal(src) {
            if(!src) return;
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
